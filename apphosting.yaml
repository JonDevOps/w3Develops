# Settings for Backend (on Cloud Run).
# See https://firebase.google.com/docs/app-hosting/configure#cloud-run
runConfig:
  minInstances: 0
  # maxInstances: 100
  # concurrency: 80
  # cpu: 1
  # memoryMiB: 512

# Environment variables.
# Since you added the GEMINI_API_KEY manually in the Firebase Console UI,
# we just need to list it here so the app knows to expect it.
env:
  - variable: GEMINI_API_KEY
